<div class="bg-gradient-to-r from-teal-50 to-cyan-50 p-4 sm:p-6 rounded-xl shadow-lg border border-teal-200 h-full flex flex-col">
  <div class="flex-1 mb-4">
    <h3 class="text-xl md:text-2xl font-bold text-sky-900 mb-2 flex items-center">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-3 text-teal-600"><path d="m12 6-2-2-2 2"/><path d="m12 18 2 2 2-2"/><path d="M12 12v6"/><path d="M12 6v6"/><path d="M18 12h-6"/><path d="m6 12 2-2"/><path d="m6 12 2 2"/><path d="M18 12-2-2"/><path d="m18 12-2 2"/><circle cx="12" cy="12" r="10"/></svg>
      Guia Rápido (eBook Sintético)
    </h3>
    <p class="text-stone-700 text-sm md:text-base mb-4">
      Gere um eBook conciso e direto ao ponto. Perfeito para uma consulta rápida, este guia foca nos pontos mais críticos de cada sistema: as principais patologias e as tecnologias essenciais.
    </p>
    <div class="flex flex-wrap gap-2 text-xs md:text-sm text-stone-600 mb-4">
      <span class="bg-teal-100 text-teal-800 px-2 py-1 rounded">✓ Layout Moderno</span>
      <span class="bg-teal-100 text-teal-800 px-2 py-1 rounded">✓ Conteúdo Focado</span>
      <span class="bg-teal-100 text-teal-800 px-2 py-1 rounded">✓ Ideal para Revisão</span>
    </div>
  </div>
  <div class="mt-auto">
    <button
      (click)="generateSummaryEbook()"
      [disabled]="generating()"
      class="w-full bg-gradient-to-r from-teal-600 to-cyan-600 hover:from-teal-700 hover:to-cyan-700 text-white font-bold py-3 px-6 rounded-lg shadow-lg transition-all duration-300 transform hover:scale-105 flex items-center justify-center disabled:opacity-50 disabled:cursor-not-allowed"
    >
      @if (generating()) {
        <svg class="animate-spin h-5 w-5 mr-2" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
        <span>Gerando...</span>
      } @else {
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="mr-2"><path d="M4 7V5a2 2 0 0 1 2-2h2"/><path d="M10 3h4"/><path d="M18 3h2a2 2 0 0 1 2 2v2"/><path d="M20 10h1"/><path d="M4 10H3"/><path d="M20 14h1"/><path d="M4 14H3"/><path d="M18 21h-2"/><path d="M12 21h-2"/><path d="M6 21H4a2 2 0 0 1-2-2v-2"/><path d="M12 8v8"/></svg>
        <span>Gerar Guia Rápido</span>
      }
    </button>
  </div>
</div>
