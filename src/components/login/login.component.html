<div class="min-h-screen flex items-center justify-center bg-stone-100 font-sans p-4">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-2xl p-6 sm:p-8 md:p-12">
      <div class="text-center mb-8">
        <h1 class="text-3xl sm:text-4xl font-bold text-sky-900">Predial 4.0</h1>
        <p class="text-stone-600 mt-2">Plano Interativo de Manutenção Predial</p>
      </div>
      <form (ngSubmit)="handleLogin()">
        <div class="space-y-6">
          <div>
            <label for="email" class="block text-sm font-bold text-stone-700 mb-2">Login</label>
            <input 
              type="email" 
              id="email"
              [(ngModel)]="email"
              name="email"
              placeholder="seu.email@exemplo.com"
              class="w-full px-4 py-3 bg-stone-50 border border-stone-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500 transition"
              required>
          </div>
          <div>
            <label for="password" class="block text-sm font-bold text-stone-700 mb-2">Senha</label>
            <input 
              type="password" 
              id="password"
              [(ngModel)]="password"
              name="password"
              placeholder="••••••••"
              class="w-full px-4 py-3 bg-stone-50 border border-stone-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-sky-500 transition"
              required>
          </div>
        </div>
        <div class="mt-8 space-y-4">
          <button 
            type="submit"
            class="w-full bg-sky-800 text-white font-bold py-3 px-4 rounded-lg hover:bg-sky-900 transition-colors shadow-lg transform hover:scale-105">
            Entrar
          </button>
          <button 
            type="button"
            (click)="handleGuestAccess()"
            class="w-full bg-stone-200 text-stone-800 font-bold py-3 px-4 rounded-lg hover:bg-stone-300 transition-colors">
            Acesso sem login
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
