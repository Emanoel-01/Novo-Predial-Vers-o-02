

@if (isOpen()) {
<div class="fixed inset-0 bg-black bg-opacity-60 z-40 flex justify-center items-center p-4" (click)="onClose()">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg p-4 sm:p-6 md:p-8" (click)="$event.stopPropagation()">
    <header class="flex justify-between items-center mb-6">
      <h2 class="text-xl sm:text-2xl font-bold text-sky-900 flex items-center gap-3">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-stone-600"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 0 2.73l-.15.08a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.38a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1 0-2.73l.15-.08a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path><circle cx="12" cy="12" r="3"></circle></svg>
        Perfil Profissional
      </h2>
      <button (click)="onClose()" class="text-stone-500 hover:text-stone-800 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </header>
    <div class="space-y-4">
      <div>
        <label for="fullName" class="block text-sm font-medium text-stone-700">Nome Completo</label>
        <input type="text" id="fullName" [(ngModel)]="profile.fullName" class="mt-1 block w-full px-3 py-2 bg-white border border-stone-300 rounded-md shadow-sm focus:outline-none focus:ring-sky-500 focus:border-sky-500">
      </div>
       <div>
        <label for="professionalTitle" class="block text-sm font-medium text-stone-700">Título Profissional</label>
        <input type="text" id="professionalTitle" [(ngModel)]="profile.professionalTitle" class="mt-1 block w-full px-3 py-2 bg-white border border-stone-300 rounded-md shadow-sm focus:outline-none focus:ring-sky-500 focus:border-sky-500">
      </div>
       <div>
        <label for="professionalId" class="block text-sm font-medium text-stone-700">Registro Profissional (CREA/CAU)</label>
        <input type="text" id="professionalId" [(ngModel)]="profile.professionalId" class="mt-1 block w-full px-3 py-2 bg-white border border-stone-300 rounded-md shadow-sm focus:outline-none focus:ring-sky-500 focus:border-sky-500">
      </div>
       <div>
        <label for="companyName" class="block text-sm font-medium text-stone-700">Nome da Empresa</label>
        <input type="text" id="companyName" [(ngModel)]="profile.companyName" class="mt-1 block w-full px-3 py-2 bg-white border border-stone-300 rounded-md shadow-sm focus:outline-none focus:ring-sky-500 focus:border-sky-500">
      </div>
       <div>
        <label for="position" class="block text-sm font-medium text-stone-700">Cargo</label>
        <input type="text" id="position" [(ngModel)]="profile.position" class="mt-1 block w-full px-3 py-2 bg-white border border-stone-300 rounded-md shadow-sm focus:outline-none focus:ring-sky-500 focus:border-sky-500">
      </div>
       <div>
        <label for="companyCnpj" class="block text-sm font-medium text-stone-700">CNPJ da Empresa</label>
        <input type="text" id="companyCnpj" [(ngModel)]="profile.companyCnpj" class="mt-1 block w-full px-3 py-2 bg-white border border-stone-300 rounded-md shadow-sm focus:outline-none focus:ring-sky-500 focus:border-sky-500">
      </div>
       <div>
        <label for="companyAddress" class="block text-sm font-medium text-stone-700">Endereço da Empresa</label>
        <input type="text" id="companyAddress" [(ngModel)]="profile.companyAddress" class="mt-1 block w-full px-3 py-2 bg-white border border-stone-300 rounded-md shadow-sm focus:outline-none focus:ring-sky-500 focus:border-sky-500">
      </div>
      <div class="space-y-2 pt-2 border-t border-slate-100">
        <label class="block text-xs font-bold uppercase text-slate-600 tracking-wider">
          Logo da Empresa
          <span class="normal-case font-normal text-slate-400 ml-1">(aparece no topo do RTIPA — PNG ou JPG)</span>
        </label>
        <input type="file" accept="image/png,image/jpeg,image/jpg,image/svg+xml"
               (change)="onLogoChange($event)"
               class="block w-full text-xs text-slate-700 file:mr-3 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:text-xs file:font-semibold file:bg-sky-50 file:text-sky-700 hover:file:bg-sky-100 cursor-pointer border border-slate-300 rounded-lg bg-white px-2 py-1.5">
        @if (profile.companyLogoBase64) {
          <div class="flex items-center gap-3 p-2 bg-slate-50 border border-slate-200 rounded-lg">
            <img [src]="profile.companyLogoBase64" alt="Logo" class="max-h-10 max-w-32 object-contain">
            <button type="button" (click)="removerLogo()"
                    class="text-xs text-rose-600 hover:text-rose-800 font-semibold cursor-pointer ml-auto">
              Remover logo
            </button>
          </div>
        }
      </div>
    </div>
     <p class="text-xs text-stone-500 mt-4"> (Os dados são salvos localmente neste dispositivo para preenchimento automático dos laudos técnicos e orçamentos.)</p>
    <div class="mt-6 flex flex-col-reverse sm:flex-row sm:justify-between sm:items-center gap-3">
       <button (click)="onLogout()" class="w-full sm:w-auto bg-red-600 text-white font-bold py-2 px-4 rounded-lg hover:bg-red-700 transition-colors flex items-center justify-center gap-2">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sair
      </button>
      <div class="flex flex-col-reverse sm:flex-row gap-3 w-full sm:w-auto">
        <button (click)="onClose()" class="w-full sm:w-auto bg-stone-200 text-stone-800 font-bold py-2 px-4 rounded-lg hover:bg-stone-300 transition-colors">
          Cancelar
        </button>
        <button (click)="saveProfile()" [disabled]="saveState() !== 'idle'" 
                class="w-full sm:w-auto font-bold py-2 px-4 rounded-lg transition-colors flex items-center justify-center"
                [class.bg-green-600]="saveState() === 'saved'"
                [class.text-white]="saveState() === 'saved' || saveState() === 'saving' || saveState() === 'idle'"
                [class.bg-sky-700]="saveState() === 'saving'"
                [class.cursor-wait]="saveState() === 'saving'"
                [class.bg-sky-800]="saveState() === 'idle'"
                [class.hover:bg-sky-900]="saveState() === 'idle'">
          @switch (saveState()) {
            @case ('idle') { <span>Salvar</span> }
            @case ('saving') { <span>Salvando...</span> }
            @case ('saved') { 
              <span class="flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                Salvo!
              </span> 
            }
          }
        </button>
      </div>
    </div>
  </div>
</div>
}
