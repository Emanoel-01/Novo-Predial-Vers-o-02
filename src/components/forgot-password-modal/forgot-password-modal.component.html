@if (isOpen()) {
<div class="fixed inset-0 bg-black bg-opacity-60 z-50 flex justify-center items-center p-4" (click)="onClose()">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-4 sm:p-6 md:p-8" (click)="$event.stopPropagation()">
    <header class="flex justify-between items-center mb-6">
      <h2 class="text-xl sm:text-2xl font-bold text-sky-900 flex items-center gap-3">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-sky-700"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
        Recuperar Senha
      </h2>
      <button (click)="onClose()" class="text-stone-500 hover:text-stone-800 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
      </button>
    </header>
    <div class="space-y-4">
      <p class="text-stone-600">
        Por favor, insira seu endereço de e-mail abaixo. Se houver uma conta associada a este e-mail, enviaremos instruções para redefinir sua senha.
      </p>
      <div>
        <label for="recovery-email" class="block text-sm font-medium text-stone-700">E-mail</label>
        <input 
          type="email" 
          id="recovery-email" 
          [(ngModel)]="email"
          placeholder="seu.email@exemplo.com"
          class="mt-1 block w-full px-3 py-2 bg-white border border-stone-300 rounded-md shadow-sm focus:outline-none focus:ring-sky-500 focus:border-sky-500">
      </div>
    </div>
    <div class="mt-6 flex flex-col-reverse sm:flex-row sm:justify-end gap-3">
      <button (click)="onClose()" class="w-full sm:w-auto bg-stone-200 text-stone-800 font-bold py-2 px-4 rounded-lg hover:bg-stone-300 transition-colors">
        Cancelar
      </button>
      <button (click)="sendRecoveryEmail()" class="w-full sm:w-auto bg-sky-800 text-white font-bold py-2 px-4 rounded-lg hover:bg-sky-900 transition-colors">
        Enviar E-mail de Recuperação
      </button>
    </div>
  </div>
</div>
}
